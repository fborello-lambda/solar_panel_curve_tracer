name: CI

# Pre-merge compile check. Complements build.yml, which builds and releases
# only after a PR is merged. This runs on every PR and on pushes to main so a
# broken build is caught before it lands.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-check:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.1
    env:
      IDF_CCACHE_ENABLE: "1"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v4

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ccache persists compiled objects between runs so repeat builds are fast.
      # The exact-sha key never hits, but restore-keys falls back to the most
      # recent cache for this IDF version.
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-idf5.5.1-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-idf5.5.1-

      - name: Build firmware (compile check)
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          idf.py build
          ccache -s || true
